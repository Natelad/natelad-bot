<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natelad WhatsApp Dashboard - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
    * { font-family: 'Roboto', sans-serif; }
    .whatsapp-green { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); }
    .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.95); }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    .float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-green-50 to-emerald-100 min-h-screen flex items-center justify-center p-4">
  
  <div class="max-w-md w-full glass rounded-3xl shadow-2xl p-8 border border-white/50">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-24 h-24 whatsapp-green rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl float">
        <i class="fas fa-robot text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Natelad Dashboard</h1>
      <p class="text-gray-600">Secure access required</p>
    </div>

    <!-- Login Form -->
    <form method="POST" action="/login" class="space-y-6">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="p-4 rounded-2xl {{ 'bg-red-100 text-red-800 border border-red-200' if category == 'error' else 'bg-green-100 text-green-800 border border-green-200' }} text-sm">
              <i class="fas {{ 'fa-exclamation-triangle' if category == 'error' else 'fa-check-circle' }} mr-2"></i>
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
          <input name="email" type="email" required 
                 class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-whatsapp-green focus:border-transparent transition-all" 
                 placeholder="your@email.com">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
          <input name="password" type="password" required 
                 class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-whatsapp-green focus:border-transparent transition-all" 
                 placeholder="••••••••">
          <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" 
              class="w-full whatsapp-green text-white font-semibold py-4 px-6 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-0.5 transition-all duration-200 text-lg">
        <i class="fas fa-sign-in-alt mr-2"></i>
        Sign In
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-xs text-gray-500">
        Need access? Contact <strong>info@nateladagency.com</strong>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.querySelector('input[name="password"]');
      const icon = event.target;
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
